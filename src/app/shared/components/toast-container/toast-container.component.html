<div class="toast-stack" aria-live="polite" aria-atomic="true">
  <div
    class="toast"
    *ngFor="let toast of toasts$ | async; trackBy: trackById"
    [ngClass]="toast.type"
    role="status"
  >
    <i
      class="ti"
      [ngClass]="toast.type === 'success' ? 'ti-check' : 'ti-alert-circle'"
    ></i>
    <span>{{ toast.message }}</span>
    <button type="button" class="toast-close" (click)="dismiss(toast.id)">
      <i class="ti ti-x"></i>
    </button>
  </div>
</div>
