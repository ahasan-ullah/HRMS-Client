<header class="header">
  <div class="crumb">
    <span>HRMS</span>
    <i class="ti ti-chevron-right"></i>
    <strong>{{ pageName }}</strong>
  </div>

  <!-- Right actions -->
  <div class="header-right">
    <!-- Role badge -->
    <span
      class="role-chip"
      [ngClass]="{
        admin: role === 'Admin',
        hr: role === 'HR',
        employee: role === 'Employee',
      }"
    >
      {{ role }}
    </span>

    <!-- Avatar -->
    <div
      class="avatar"
      [title]="username"
      [ngClass]="{
        'avatar-admin': role === 'Admin',
        'avatar-hr': role === 'HR',
        'avatar-employee': role === 'Employee',
      }"
    >
      {{ initials }}
    </div>
  </div>
</header>
